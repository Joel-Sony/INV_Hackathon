<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan — Reminders</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
    <div class="app-container">
        <nav class="dash-nav">
            <div class="logo-section" style="justify-content:flex-start;">
                <div class="logo-icon" style="width:34px;height:34px;border-radius:9px;font-size:17px;">💊</div>
                <a href="dashboard.html" class="logo-text" style="font-size:1.35rem;text-decoration:none;">MediScan</a>
            </div>
            <div class="nav-right">
                <span class="nav-user" id="nav-user"></span>
                <a href="index.html" class="btn-nav">🔬 Scanner</a>
                <a href="dashboard.html" class="btn-nav">📋 Dashboard</a>
                <button class="btn-nav" onclick="logout()">Sign Out</button>
            </div>
        </nav>

        <main class="main-content">
            <h2 style="margin-bottom:24px;">⏰ Reminders</h2>

            <!-- Section A: Active Reminders -->
            <section class="dash-section">
                <h3>Active Reminders</h3>
                <div id="reminders-list"><p class="loading-text">Loading...</p></div>
            </section>

            <!-- Section B: Create Manual Reminder -->
            <section class="dash-section">
                <h3>➕ Create Reminder</h3>
                <div class="upload-card" style="margin-top:12px;">
                    <form id="create-reminder-form" style="padding:24px;">
                        <label class="form-label">Medicine Name *</label>
                        <input type="text" id="r-medicine" class="form-input" placeholder="e.g. Metformin 500mg" required>

                        <label class="form-label" style="margin-top:12px;">Dosage</label>
                        <input type="text" id="r-dosage" class="form-input" placeholder="e.g. 500mg">

                        <label class="form-label" style="margin-top:12px;">Frequency</label>
                        <select id="r-frequency" class="form-input">
                            <option value="once daily">Once daily</option>
                            <option value="twice daily">Twice daily</option>
                            <option value="three times daily">Three times daily</option>
                            <option value="once daily before breakfast">Before breakfast</option>
                            <option value="once daily at bedtime">At bedtime</option>
                        </select>

                        <label class="form-label" style="margin-top:12px;">Phone Number</label>
                        <input type="tel" id="r-phone" class="form-input" placeholder="10-digit number">

                        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px;">Create Reminder</button>
                        <div id="create-status" style="margin-top:12px;font-size:0.85rem;"></div>
                    </form>
                </div>
            </section>

            <!-- Section C: Import from Prescription -->
            <section class="dash-section">
                <h3>📥 Import from Prescription</h3>
                <div class="upload-card" style="margin-top:12px;padding:24px;">
                    <label class="form-label">Select Prescription</label>
                    <select id="rx-select" class="form-input"><option value="">Loading...</option></select>
                    <div id="rx-medicines" style="margin-top:16px;"></div>
                    <button class="btn btn-primary" id="btn-import" style="width:100%;margin-top:16px;display:none;">
                        Import Selected as Reminders
                    </button>
                    <div id="import-status" style="margin-top:12px;font-size:0.85rem;"></div>
                </div>
            </section>

            <!-- Section D: Email Logs -->
            <section class="dash-section">
                <h3>📧 Email Logs</h3>
                <button class="btn btn-secondary" id="btn-test-email" style="margin-bottom:12px;">📧 Send Test Email</button>
                <div id="sms-logs"><p class="loading-text">Loading...</p></div>
            </section>
        </main>

        <footer class="app-footer"><p>MediScan — Built for clarity, not complexity &nbsp;·&nbsp; ⚠ Not a substitute for medical advice</p></footer>
    </div>

    <script src="auth.js"></script>
    <script>
    if (!requireAuth()) throw 'redirect';
    const user = getUser();
    if (user) document.getElementById('nav-user').textContent = '👤 ' + user.name;

    // Pre-fill phone
    document.getElementById('r-phone').value = user?.phone || '';

    // ===== Load Reminders =====
    async function loadReminders() {
        const container = document.getElementById('reminders-list');
        try {
            const res = await fetch(API_BASE + '/reminders', { headers: authHeaders() });
            const data = await res.json();
            const list = data.reminders || [];
            if (list.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem;">No reminders yet. Create one below!</p>';
                return;
            }
            container.innerHTML = '<table class="rem-table"><thead><tr><th>Medicine</th><th>Frequency</th><th>Times</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead><tbody>' +
                list.map(r => {
                    const times = (r.reminder_times || []).map(t => {
                        const [h,m] = t.split(':');
                        const hr = parseInt(h);
                        return (hr > 12 ? (hr-12) : hr) + ':' + m + (hr >= 12 ? ' PM' : ' AM');
                    }).join(', ');
                    const status = r.is_active ? '<span class="badge-active">🟢 Active</span>' : '<span class="badge-paused">⏸ Paused</span>';
                    const phone = r.phone_number ? r.phone_number.slice(0,5) + 'xxxxx' : '-';
                    return `<tr>
                        <td><strong>${r.medicine_name}</strong><br><small>${r.dosage || ''}</small></td>
                        <td>${r.frequency || '-'}</td>
                        <td>${times || '-'}</td>
                        <td>${phone}</td>
                        <td>${status}</td>
                        <td>
                            <button class="btn-sm" onclick="toggleReminder(${r.id})">${r.is_active ? 'Pause' : 'Resume'}</button>
                            <button class="btn-sm btn-danger" onclick="deleteReminder(${r.id})">Delete</button>
                        </td>
                    </tr>`;
                }).join('') + '</tbody></table>';
        } catch (err) {
            container.innerHTML = '<p style="color:var(--error);">Failed to load reminders.</p>';
        }
    }

    async function toggleReminder(id) {
        await fetch(API_BASE + '/reminders/' + id + '/toggle', { method: 'PUT', headers: authHeaders() });
        loadReminders();
    }

    async function deleteReminder(id) {
        if (!confirm('Delete this reminder?')) return;
        await fetch(API_BASE + '/reminders/' + id, { method: 'DELETE', headers: authHeaders() });
        loadReminders();
    }

    // ===== Create Reminder =====
    document.getElementById('create-reminder-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('create-status');
        status.textContent = 'Creating...';
        status.style.color = 'var(--text-secondary)';
        try {
            const res = await fetch(API_BASE + '/reminders', {
                method: 'POST',
                headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    medicine_name: document.getElementById('r-medicine').value,
                    dosage: document.getElementById('r-dosage').value,
                    frequency: document.getElementById('r-frequency').value,
                    phone_number: document.getElementById('r-phone').value,
                })
            });
            if (!res.ok) throw new Error('Failed');
            const data = await res.json();
            status.textContent = '✅ Reminder created! Times: ' + (data.reminder_times || []).join(', ');
            status.style.color = 'var(--success)';
            document.getElementById('r-medicine').value = '';
            document.getElementById('r-dosage').value = '';
            loadReminders();
        } catch (err) {
            status.textContent = '❌ Failed to create reminder';
            status.style.color = 'var(--error)';
        }
    });

    // ===== Import from Prescription =====
    async function loadPrescriptions() {
        const select = document.getElementById('rx-select');
        try {
            const res = await fetch(API_BASE + '/prescriptions', { headers: authHeaders() });
            const data = await res.json();
            const list = data.prescriptions || [];
            select.innerHTML = '<option value="">-- Select a prescription --</option>' +
                list.map(rx => {
                    const date = new Date(rx.uploaded_at).toLocaleDateString('en-IN', {day:'numeric',month:'short'});
                    const count = (rx.medicines || []).length;
                    return `<option value="${rx.id}">${rx.filename || 'Prescription'} (${date}) — ${count} meds</option>`;
                }).join('');
        } catch (e) {
            select.innerHTML = '<option value="">Failed to load</option>';
        }
    }

    document.getElementById('rx-select').addEventListener('change', async (e) => {
        const id = e.target.value;
        const container = document.getElementById('rx-medicines');
        const importBtn = document.getElementById('btn-import');
        if (!id) { container.innerHTML = ''; importBtn.style.display = 'none'; return; }

        try {
            const res = await fetch(API_BASE + '/prescriptions/' + id, { headers: authHeaders() });
            const rx = await res.json();
            const meds = rx.medicines || [];
            if (meds.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);">No medicines in this prescription.</p>';
                importBtn.style.display = 'none';
                return;
            }
            container.innerHTML = meds.map((m, i) => `
                <label class="import-med">
                    <input type="checkbox" value="${i}" checked>
                    <span><strong>${m.name}</strong> — ${m.dosage || ''} (${m.frequency || 'unknown'})</span>
                </label>
            `).join('');
            importBtn.style.display = 'block';
            importBtn.onclick = () => importMeds(rx);
        } catch (e) {
            container.innerHTML = '<p style="color:var(--error);">Failed to load.</p>';
        }
    });

    async function importMeds(rx) {
        const checks = document.querySelectorAll('#rx-medicines input[type=checkbox]:checked');
        const meds = rx.medicines || [];
        const status = document.getElementById('import-status');
        let created = 0;

        for (const cb of checks) {
            const med = meds[parseInt(cb.value)];
            if (!med) continue;
            try {
                await fetch(API_BASE + '/reminders', {
                    method: 'POST',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        medicine_name: med.name + (med.dosage ? ' ' + med.dosage : ''),
                        dosage: med.dosage || '',
                        frequency: med.frequency || 'once daily',
                        phone_number: user.phone,
                        prescription_id: rx.id
                    })
                });
                created++;
            } catch (e) {}
        }
        status.textContent = `✅ Imported ${created} reminder(s)!`;
        status.style.color = 'var(--success)';
        loadReminders();
    }

    // ===== SMS Logs =====
    async function loadSmsLogs() {
        const container = document.getElementById('sms-logs');
        try {
            const res = await fetch(API_BASE + '/reminders/logs', { headers: authHeaders() });
            const data = await res.json();
            const logs = data.logs || [];
            if (logs.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem;">No SMS logs yet.</p>';
                return;
            }
            container.innerHTML = '<table class="rem-table"><thead><tr><th>Time</th><th>Phone</th><th>Medicine</th><th>Status</th></tr></thead><tbody>' +
                logs.map(l => {
                    const time = l.sent_at ? new Date(l.sent_at).toLocaleString('en-IN') : '-';
                    const statusClass = l.status === 'sent' ? 'badge-active' : (l.status === 'mock' ? 'badge-paused' : 'badge-failed');
                    return `<tr><td>${time}</td><td>${l.phone || '-'}</td><td>${l.medicine_name || l.message || '-'}</td><td><span class="${statusClass}">${l.status}</span></td></tr>`;
                }).join('') + '</tbody></table>';
        } catch (e) {
            container.innerHTML = '<p style="color:var(--error);">Failed to load logs.</p>';
        }
    }

    document.getElementById('btn-test-email').addEventListener('click', async () => {
        const btn = document.getElementById('btn-test-email');
        btn.textContent = 'Sending...';
        btn.disabled = true;
        try {
            const res = await fetch(API_BASE + '/reminders/test-email', {
                method: 'POST',
                headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ medicine_name: 'Metformin', dosage: '500mg', frequency: 'twice daily' })
            });
            const data = await res.json();
            const status = data.email_result?.status || 'done';
            btn.textContent = status === 'sent' ? '✅ Email Sent!' : ('⚠️ ' + status);
            loadSmsLogs();
        } catch (e) {
            btn.textContent = '❌ Failed';
        }
        setTimeout(() => { btn.textContent = '📧 Send Test Email'; btn.disabled = false; }, 3000);
    });

    // ===== Init =====
    loadReminders();
    loadPrescriptions();
    loadSmsLogs();
    </script>
</body>
</html>
