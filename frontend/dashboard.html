<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
    <div class="app-container">
        <!-- Nav -->
        <nav class="dash-nav">
            <div class="logo-section">
                <div class="logo-icon" style="font-size:24px;">💊</div>
                <span class="logo-text" style="font-size:1.4rem;">MediScan</span>
            </div>
            <div class="nav-right">
                <span class="nav-user" id="nav-user"></span>
                <button class="btn-nav" onclick="logout()">Logout</button>
            </div>
        </nav>

        <main class="main-content">
            <!-- Quick Actions -->
            <div class="dash-actions">
                <a href="index.html" class="action-card">
                    <span class="action-icon">📤</span>
                    <span class="action-label">Upload Prescription</span>
                </a>
                <a href="reminders.html" class="action-card">
                    <span class="action-icon">⏰</span>
                    <span class="action-label">Manage Reminders</span>
                </a>
            </div>

            <!-- Prescriptions -->
            <section class="dash-section">
                <h2>📋 Your Prescriptions</h2>
                <div id="prescriptions-list"><p class="loading-text">Loading...</p></div>
            </section>
        </main>

        <footer class="app-footer">
            <p>MediScan — Built for understanding your prescriptions</p>
        </footer>
    </div>

    <script src="auth.js"></script>
    <script>
        if (!requireAuth()) throw 'redirect';

        const user = getUser();
        document.getElementById('nav-user').textContent = user ? ('👤 ' + user.name) : '';

        async function loadPrescriptions() {
            const container = document.getElementById('prescriptions-list');
            try {
                const res = await fetch(API_BASE + '/prescriptions', { headers: authHeaders() });
                if (!res.ok) throw new Error('Failed to load');
                const data = await res.json();
                const list = data.prescriptions || [];

                if (list.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No prescriptions yet.</p><a href="index.html" class="btn btn-primary" style="margin-top:12px;display:inline-flex;">📤 Upload Your First</a></div>';
                    return;
                }

                container.innerHTML = list.map(rx => {
                    const meds = rx.medicines || [];
                    const medNames = meds.map(m => m.name || 'Unknown').join(', ') || 'No medicines detected';
                    const date = new Date(rx.uploaded_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
                    return `
                        <div class="rx-card">
                            <div class="rx-header">
                                <span class="rx-file">📄 ${rx.filename || 'Prescription'}</span>
                                <span class="rx-date">${date}</span>
                            </div>
                            <div class="rx-meds">${medNames}</div>
                            <div class="rx-count">${meds.length} medicine${meds.length !== 1 ? 's' : ''} detected</div>
                        </div>`;
                }).join('');
            } catch (err) {
                container.innerHTML = '<p style="color:var(--error);">Failed to load prescriptions.</p>';
            }
        }

        loadPrescriptions();
    </script>
</body>
</html>
