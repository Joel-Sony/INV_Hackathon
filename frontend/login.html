<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-section">
                <div class="logo-icon">💊</div>
                <h1 class="logo-text">MediScan</h1>
            </div>
            <p class="tagline">Sign in to manage your prescriptions & reminders</p>
        </header>

        <main class="main-content">
            <div class="upload-card" style="max-width:420px;margin:0 auto;">
                <div style="padding:32px 28px;">
                    <h2 style="margin-bottom:24px;text-align:center;font-size:1.4rem;">Sign In</h2>

                    <div class="error-card" id="login-error" style="display:none;margin-bottom:16px;">
                        <p id="login-error-msg" style="color:var(--error);font-size:0.9rem;"></p>
                    </div>

                    <form id="login-form">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="arjun@demo.com" required>

                        <label class="form-label" style="margin-top:16px;">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="demo123" required>

                        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:24px;">
                            Sign In
                        </button>
                    </form>

                    <div style="margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);">
                        <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:8px;">Demo Accounts:</p>
                        <p style="font-size:0.82rem;color:var(--text-secondary);">
                            <strong>athulkishor2004@gmail.com</strong> / demo123<br>
                            <strong>priya@demo.com</strong> / demo123<br>
                            <strong>rahul@demo.com</strong> / demo123
                        </p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>MediScan — Built for understanding your prescriptions</p>
        </footer>
    </div>

    <script src="auth.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        if (getToken()) window.location.href = 'dashboard.html';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('login-error');
            const errMsg = document.getElementById('login-error-msg');
            errEl.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');

                setAuth(data.token, data.user);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errEl.style.display = 'block';
                errMsg.textContent = err.message;
            }
        });
    </script>
</body>
</html>
